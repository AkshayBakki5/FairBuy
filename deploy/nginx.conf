# FairBuy — nginx reverse proxy for EC2 backend
# Copy to: /etc/nginx/sites-available/fairbuy
# Enable:  sudo ln -s /etc/nginx/sites-available/fairbuy /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;          # matches any hostname / IP

    # ── API + SSE ──────────────────────────────────────────────────────────
    location /api {
        proxy_pass         http://localhost:4000;
        proxy_http_version 1.1;

        # SSE requires no buffering and keep-alive upgrade
        proxy_set_header   Connection     '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — search can take up to 60 s
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
    }

    # ── Health check ────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://localhost:4000/api/health;
    }
}
